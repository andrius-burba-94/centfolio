<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centfolio dashboard, light mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: oklch(0.99 0.005 38);
      --foreground: oklch(0.22 0.020 38);
      --card: oklch(0.96 0.010 38);
      --muted: oklch(0.94 0.012 38);
      --muted-foreground: oklch(0.50 0.020 38);
      --placeholder: oklch(0.65 0.020 38);
      --border: oklch(0.90 0.015 38);
      --input: oklch(0.80 0.020 38);
      --ring: oklch(0.55 0.12 38);
      --primary: oklch(0.45 0.13 38);
      --primary-foreground: oklch(0.99 0.005 38);

      --font-display: "Fraunces", Georgia, serif;
      --font-sans: "Inter", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-feature-settings: "tnum" 1;
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: var(--font-sans);
      font-size: 17px;
      line-height: 1.60;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      height: 64px;
    }

    .wordmark {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 22px;
      line-height: 1.20;
      letter-spacing: -0.005em;
      color: var(--foreground);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      background-color: transparent;
      color: var(--muted-foreground);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 150ms cubic-bezier(0.25, 1, 0.5, 1);
    }

    .icon-button:hover {
      background-color: var(--card);
    }

    .initials-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      background-color: var(--muted);
      color: var(--foreground);
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 14px;
      line-height: 1.40;
      letter-spacing: 0.01em;
      user-select: none;
    }

    .icon-button:focus-visible,
    .initials-circle:focus-visible {
      outline: 2px solid var(--ring);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0ms !important;
        animation-duration: 0ms !important;
      }
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .hero {
      max-width: 65ch;
      text-align: center;
    }

    .hero-heading {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 48px;
      line-height: 1.10;
      letter-spacing: -0.01em;
      color: var(--foreground);
      margin-bottom: 16px;
    }

    .hero-body {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 17px;
      line-height: 1.60;
      color: var(--muted-foreground);
      max-width: 42ch;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <span class="wordmark">Centfolio</span>
    <div class="top-bar-right">
      <button class="icon-button" type="button" aria-label="Theme: light">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2"/>
          <path d="M12 20v2"/>
          <path d="m4.93 4.93 1.41 1.41"/>
          <path d="m17.66 17.66 1.41 1.41"/>
          <path d="M2 12h2"/>
          <path d="M20 12h2"/>
          <path d="m6.34 17.66-1.41 1.41"/>
          <path d="m19.07 4.93-1.41 1.41"/>
        </svg>
      </button>
      <button class="initials-circle" type="button" aria-label="Account menu for Andrius Burba">AB</button>
    </div>
  </header>
  <main class="main">
    <div class="hero">
      <h1 class="hero-heading">Your money, considered.</h1>
      <p class="hero-body">Centfolio is empty until you connect an account. Account-connection arrives in a later phase. Settle in.</p>
    </div>
  </main>
</body>
</html>
